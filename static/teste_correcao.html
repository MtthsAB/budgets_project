<!DOCTYPE html>
<html>
<head>
    <title>Teste Correção itensPedido</title>
</head>
<body>
    <h1>Teste da Correção</h1>
    <button id="testarFuncoes">Testar Funções</button>
    <div id="resultado"></div>

    <script>
        // Replicar a estrutura corrigida
        let itensPedido = [];
        let contadorItens = 0;
        let produtoSelecionado = null;

        // Simular funções principais
        function atualizarTotaisSidebar() {
            try {
                const subtotal = itensPedido.reduce((total, item) => total + item.preco_total, 0);
                console.log('✅ atualizarTotaisSidebar funcionou! Subtotal:', subtotal);
                return true;
            } catch (error) {
                console.error('❌ Erro em atualizarTotaisSidebar:', error);
                return false;
            }
        }

        function calcularTotaisGerais() {
            try {
                const subtotal = itensPedido.reduce((total, item) => total + item.preco_total, 0);
                console.log('✅ calcularTotaisGerais funcionou! Subtotal:', subtotal);
                atualizarTotaisSidebar();
                return true;
            } catch (error) {
                console.error('❌ Erro em calcularTotaisGerais:', error);
                return false;
            }
        }

        function simularAdicaoItem() {
            try {
                produtoSelecionado = {
                    id: 'cadeira_1',
                    nome_produto: 'EVA',
                    preco: 857.00
                };

                const item = {
                    id: ++contadorItens,
                    produto_id: 'cadeira_1',
                    produto_nome: 'EVA',
                    preco_unitario: 857.00,
                    preco_total: 857.00
                };

                itensPedido.push(item);
                calcularTotaisGerais();
                
                console.log('✅ Simulação de adição de item funcionou!');
                return true;
            } catch (error) {
                console.error('❌ Erro na simulação de adição de item:', error);
                return false;
            }
        }

        document.getElementById('testarFuncoes').addEventListener('click', function() {
            console.log('=== INICIANDO TESTE ===');
            
            const resultado = document.getElementById('resultado');
            let html = '<h2>Resultados:</h2>';
            
            // Teste 1: Verificar se variáveis existem
            html += `<p>itensPedido definido: ${typeof itensPedido !== 'undefined' ? '✅' : '❌'}</p>`;
            html += `<p>contadorItens definido: ${typeof contadorItens !== 'undefined' ? '✅' : '❌'}</p>`;
            html += `<p>produtoSelecionado definido: ${typeof produtoSelecionado !== 'undefined' ? '✅' : '❌'}</p>`;
            
            // Teste 2: Testar funções
            html += `<p>atualizarTotaisSidebar: ${atualizarTotaisSidebar() ? '✅' : '❌'}</p>`;
            html += `<p>calcularTotaisGerais: ${calcularTotaisGerais() ? '✅' : '❌'}</p>`;
            html += `<p>simularAdicaoItem: ${simularAdicaoItem() ? '✅' : '❌'}</p>`;
            
            resultado.innerHTML = html;
            
            console.log('=== TESTE CONCLUÍDO ===');
        });
    </script>
</body>
</html>
