<!DOCTYPE html>
<html>
<head>
    <title>Teste do Botão Adicionar Módulo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Teste do Botão Adicionar Módulo</h1>
        
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">
                        <i class="bi bi-grid-3x3"></i> Módulos (Opcional)
                    </h6>
                    <button type="button" class="btn btn-sm btn-success" onclick="adicionarModulo()">
                        <i class="bi bi-plus"></i> Adicionar Módulo
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div id="modulosContainer">
                    <!-- Módulos serão adicionados aqui -->
                </div>
                
                <div class="alert alert-light mb-0" id="noModulosAlert">
                    <i class="bi bi-info-circle"></i> 
                    Nenhum módulo adicionado. Clique em "Adicionar Módulo" para começar.
                </div>
            </div>
        </div>
    </div>

    <script>
        let moduloCount = 0;

        function adicionarModulo() {
            console.log('Função adicionarModulo() chamada!');
            moduloCount++;
            
            const container = document.getElementById('modulosContainer');
            const noModulosAlert = document.getElementById('noModulosAlert');
            
            const moduloHtml = `
                <div class="modulo-item border rounded p-3 mb-3" id="modulo${moduloCount}">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="mb-0">Módulo ${moduloCount}</h6>
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removerModulo(${moduloCount})">
                            <i class="bi bi-trash"></i> Remover
                        </button>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" name="modulo_nome_${moduloCount}" placeholder="Nome do módulo" required>
                                <label>Nome do Módulo *</label>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', moduloHtml);
            noModulosAlert.style.display = 'none';
        }

        function removerModulo(id) {
            const modulo = document.getElementById(`modulo${id}`);
            modulo.remove();
            
            const container = document.getElementById('modulosContainer');
            const noModulosAlert = document.getElementById('noModulosAlert');
            
            if (container.children.length === 0) {
                noModulosAlert.style.display = 'block';
            }
        }
    </script>
</body>
</html>
