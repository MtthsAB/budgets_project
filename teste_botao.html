<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste do Botão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste do Botão "Adicionar Item"</h1>
        
        <!-- Botão de teste -->
        <button type="button" class="btn btn-success" id="btnAdicionarItem" data-bs-toggle="modal" data-bs-target="#modalAdicionarItem">
            <i class="bi bi-plus-circle"></i> Adicionar Item
        </button>
        
        <!-- Modal de teste -->
        <div class="modal fade" id="modalAdicionarItem" tabindex="-1">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Teste - Adicionar Item ao Pedido</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>Se você está vendo esta mensagem, o botão está funcionando!</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('btnAdicionarItem');
            btn.addEventListener('click', function() {
                console.log('Botão clicado!');
                alert('Botão foi clicado!');
            });
        });
    </script>
</body>
</html>
