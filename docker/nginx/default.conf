# Upstream para a aplicação Django
upstream django_app {
    server app:8000;
    keepalive 32;
}

# Configuração para HTTP (redirecionamento para HTTPS quando via Cloudflare)
server {
    listen 80;
    server_name meitans.shop www.meitans.shop localhost 127.0.0.1;

    # Configurações específicas para Cloudflare
    # IPs confiáveis do Cloudflare (atualize conforme necessário)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    
    # Header para IP real do visitante
    real_ip_header CF-Connecting-IP;

    # Tamanho máximo do corpo da requisição
    client_max_body_size 100M;

    # Configurações de timeout
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Localização dos arquivos estáticos
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Compressão específica para estáticos
        gzip_static on;
    }

    # Localização dos arquivos de media
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Vary Accept-Encoding;
    }

    # Localização para arquivos robots.txt e favicon.ico
    location = /favicon.ico {
        alias /app/staticfiles/images/favicon.ico;
        log_not_found off;
        access_log off;
        expires 30d;
    }

    location = /robots.txt {
        alias /app/staticfiles/robots.txt;
        log_not_found off;
        access_log off;
    }

    # Rate limiting para endpoints específicos
    location ~ ^/(admin|api)/ {
        limit_req zone=api burst=10 nodelay;
        
        # Headers para Cloudflare
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Headers específicos do Cloudflare
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        
        # Configurações de proxy
        proxy_redirect off;
        proxy_buffering off;
        proxy_pass http://django_app;
    }

    # Localização principal para todas as outras requisições
    location / {
        # Headers para Cloudflare
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Headers específicos do Cloudflare
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        
        # Configurações de proxy
        proxy_redirect off;
        proxy_buffering off;
        proxy_pass http://django_app;
    }

    # Health check endpoint
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\.(ht|env|git) {
        deny all;
        return 404;
    }

    # Bloquear acesso direto a arquivos Python
    location ~ \.py$ {
        deny all;
        return 404;
    }
}
