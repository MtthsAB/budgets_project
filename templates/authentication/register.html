{% extends 'base.html' %}

{% block title %}Cadastro - Sistema de Produtos{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-primary text-white text-center">
        <h4 class="mb-0">
            <i class="bi bi-person-plus"></i> Criar Conta
        </h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Nome" required>
                        <label for="first_name"><i class="bi bi-person"></i> Nome</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Sobrenome" required>
                        <label for="last_name"><i class="bi bi-person"></i> Sobrenome</label>
                    </div>
                </div>
            </div>
            
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="email@exemplo.com" required>
                <label for="email"><i class="bi bi-envelope"></i> Email</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                <label for="password"><i class="bi bi-lock"></i> Senha</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Confirmar Senha" required>
                <label for="password_confirm"><i class="bi bi-lock"></i> Confirmar Senha</label>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-person-plus"></i> Criar Conta
                </button>
            </div>
        </form>
        
        <hr>
        
        <div class="text-center">
            <p class="mb-0">Já tem conta?</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary">
                <i class="bi bi-box-arrow-in-right"></i> Fazer Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
