<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Upload Imagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Teste de Upload de Imagem</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Teste simples de upload -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5><i class="bi bi-image"></i> Upload de Imagem</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="imagem_teste" class="form-label fs-5 fw-bold">
                            <i class="bi bi-upload"></i> Escolher Imagem
                        </label>
                        <input type="file" class="form-control form-control-lg" 
                               id="imagem_teste" name="imagem_teste" accept="image/*">
                        <div class="form-text">Clique aqui para selecionar uma imagem</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-save"></i> Enviar Imagem
                    </button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
