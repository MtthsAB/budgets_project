<!-- Campos específicos para Banquetas -->
<div class="row" id="campos-banqueta" style="display: none;">
    <div class="col-md-3">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="ativo_banqueta" name="ativo_banqueta" checked>
            <label class="form-check-label" for="ativo_banqueta">
                Banqueta Ativa
            </label>
        </div>
    </div>
    <div class="col-md-9">
        <p class="text-muted mb-3">
            <i class="bi bi-info-circle"></i> 
            Preencha as especificações técnicas da banqueta.
        </p>
    </div>
</div>

<!-- Dimensões da Banqueta -->
<div id="dimensoes-banqueta" style="display: none;">
    <div class="row">
        <div class="col-md-4">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="largura_banqueta" 
                       name="largura_banqueta" placeholder="0.00" min="0.01">
                <label for="largura_banqueta">Largura (cm) *</label>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="profundidade_banqueta" 
                       name="profundidade_banqueta" placeholder="0.00" min="0.01">
                <label for="profundidade_banqueta">Profundidade (cm) *</label>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="altura_banqueta" 
                       name="altura_banqueta" placeholder="0.00" min="0.01">
                <label for="altura_banqueta">Altura (cm) *</label>
            </div>
        </div>
    </div>
    
    <!-- Especificações Técnicas -->
    <div class="row">
        <div class="col-md-3">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="tecido_metros_banqueta" 
                       name="tecido_metros_banqueta" placeholder="0.00" min="0.01">
                <label for="tecido_metros_banqueta">Tecido (m) *</label>
            </div>
        </div>
        <div class="col-md-3">
            <div class="form-floating mb-3">
                <input type="number" step="0.001" class="form-control" id="volume_m3_banqueta" 
                       name="volume_m3_banqueta" placeholder="0.000" min="0.001">
                <label for="volume_m3_banqueta">Volume (m³) *</label>
            </div>
        </div>
        <div class="col-md-3">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="peso_kg_banqueta" 
                       name="peso_kg_banqueta" placeholder="0.00" min="0.01">
                <label for="peso_kg_banqueta">Peso (kg) *</label>
            </div>
        </div>
        <div class="col-md-3">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="preco_banqueta" 
                       name="preco_banqueta" placeholder="0.00" min="0.01">
                <label for="preco_banqueta">Preço (R$) *</label>
            </div>
        </div>
    </div>
    
    <!-- Descrição -->
    <div class="row">
        <div class="col-12">
            <div class="form-floating mb-3">
                <textarea class="form-control auto-resize-textarea" id="descricao_banqueta" name="descricao_banqueta" 
                         placeholder="Descrição da banqueta" style="height: 80px;"></textarea>
                <label for="descricao_banqueta">Descrição (opcional)</label>
            </div>
        </div>
    </div>
</div>
