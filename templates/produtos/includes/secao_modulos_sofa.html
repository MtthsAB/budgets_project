<!-- Seção de Módulos para Sofás -->
<div id="secao-modulos" style="display: none;">
    <hr class="my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0">
            <i class="bi bi-grid-3x3 text-primary"></i> Módulos (Opcional)
        </h6>
        <button type="button" class="btn btn-sm btn-success" onclick="adicionarModulo()">
            <i class="bi bi-plus"></i> Adicionar Módulo
        </button>
    </div>
    <div id="modulosContainer">
        <!-- Módulos serão adicionados aqui via JavaScript -->
    </div>
    <div class="alert alert-info mb-0" id="noModulosAlert">
        <i class="bi bi-info-circle"></i> 
        Os módulos são opcionais. Clique em "Adicionar Módulo" se desejar adicionar módulos ao produto.
    </div>
</div>
