<!-- JavaScript específico para Sofás -->
<script>
let moduloCount = 0;
let modulosColapsados = true;

// Função específica para alternar campos de sofás
function toggleCamposEspecificos(tipoNome) {
    const camposSofa = document.getElementById('campos-sofa');
    const secaoModulos = document.getElementById('secao-modulos');
    
    // Esconder campos específicos primeiro
    if (camposSofa) camposSofa.style.display = 'none';
    if (secaoModulos) secaoModulos.style.display = 'none';
    
    // Mostrar campos conforme o tipo
    if (tipoNome === 'Sofás') {
        if (camposSofa) camposSofa.style.display = 'flex';
        if (secaoModulos) secaoModulos.style.display = 'block';
    }
}

// Função para adicionar módulo
function adicionarModulo() {
    moduloCount++;
    const container = document.getElementById('modulosContainer');
    const noModulosAlert = document.getElementById('noModulosAlert');
    
    if (noModulosAlert) noModulosAlert.style.display = 'none';
    
    const moduloHTML = `
        <div class="modulo-item border rounded mb-3" id="modulo-${moduloCount}">
            <div class="modulo-header d-flex justify-content-between align-items-center p-3 bg-primary bg-opacity-10 rounded-top border-bottom" 
                 style="cursor: pointer; transition: background-color 0.2s; user-select: none;" 
                 onclick="toggleModulo(${moduloCount}, 'novo')"
                 onmouseover="this.style.backgroundColor='rgba(13, 110, 253, 0.15)'"
                 onmouseout="this.style.backgroundColor='rgba(13, 110, 253, 0.1)'">
                <h6 class="mb-0 d-flex align-items-center">
                    <i class="bi bi-cube text-primary me-2"></i> 
                    <span class="fw-semibold">Módulo ${moduloCount}</span>
                    <i class="bi bi-chevron-down ms-2 toggle-icon text-primary" id="toggle-novo-${moduloCount}" 
                       style="transition: transform 0.2s;"></i>
                </h6>
                <button type="button" class="btn btn-sm btn-outline-danger" 
                        onclick="event.stopPropagation(); removerModulo(${moduloCount})"
                        title="Remover módulo">
                    <i class="bi bi-trash"></i> Remover
                </button>
            </div>
            
            <div class="modulo-content p-3" id="content-novo-${moduloCount}">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" name="modulo_nome" 
                                   placeholder="Nome do módulo" required>
                            <label>Nome do Módulo</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <input type="number" step="0.01" class="form-control" name="modulo_profundidade_${moduloCount}" 
                                   placeholder="Profundidade">
                            <label>Profundidade (cm)</label>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-floating mb-3">
                            <input type="number" step="0.01" class="form-control" name="modulo_altura_${moduloCount}" 
                                   placeholder="Altura">
                            <label>Altura (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating mb-3">
                            <input type="number" step="0.01" class="form-control" name="modulo_braco_${moduloCount}" 
                                   placeholder="Braço">
                            <label>Braço (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Imagem do Módulo</label>
                            <input type="file" class="form-control" name="modulo_imagem_principal_${moduloCount}" 
                                   accept="image/*">
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" name="modulo_descricao_${moduloCount}" 
                              rows="2" placeholder="Descrição do módulo"></textarea>
                </div>
                
                <!-- Tamanhos do Módulo -->
                <div class="mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="mb-0">
                            <i class="bi bi-rulers text-success"></i> Tamanhos (Opcional)
                        </h6>
                        <button type="button" class="btn btn-sm btn-outline-success" onclick="adicionarTamanho(${moduloCount})">
                            <i class="bi bi-plus"></i> Adicionar Tamanho
                        </button>
                    </div>
                    <div id="tamanhosContainer_${moduloCount}">
                        <!-- Tamanhos serão adicionados aqui -->
                    </div>
                </div>
            </div>
        </div>
    `;
    
    if (container) container.insertAdjacentHTML('beforeend', moduloHTML);
    
    // Se todos os módulos estão colapsados, colapsar este também
    if (modulosColapsados) {
        toggleModulo(moduloCount, 'novo');
    }
}

// Função para remover módulo
function removerModulo(moduloId) {
    const modulo = document.getElementById(`modulo-${moduloId}`) || document.getElementById(`modulo_${moduloId}`);
    if (modulo) modulo.remove();
    
    // Se não há mais módulos, mostrar alert
    const container = document.getElementById('modulosContainer');
    const noModulosAlert = document.getElementById('noModulosAlert');
    if (container && container.children.length === 0 && noModulosAlert) {
        noModulosAlert.style.display = 'block';
    }
}

// Função para remover módulo existente
function removerModuloExistente(moduloId) {
    const modulo = document.getElementById(`modulo-existente-${moduloId}`);
    if (modulo) modulo.remove();
    
    // Se não há mais módulos, mostrar alert
    const container = document.getElementById('modulosContainer');
    const noModulosAlert = document.getElementById('noModulosAlert');
    if (container && container.children.length === 0 && noModulosAlert) {
        noModulosAlert.style.display = 'block';
    }
}

// Função para alternar visibilidade de um módulo
function toggleModulo(moduloId, tipo) {
    const content = document.getElementById(`content-${tipo}-${moduloId}`);
    const icon = document.getElementById(`toggle-${tipo}-${moduloId}`);
    
    if (content && icon) {
        if (content.style.display === 'none') {
            content.style.display = 'block';
            icon.style.transform = 'rotate(180deg)';
        } else {
            content.style.display = 'none';
            icon.style.transform = 'rotate(0deg)';
        }
    }
}

// Função para expandir/recolher todos os módulos
function toggleTodosModulos() {
    const btn = document.getElementById('toggleModulosBtn');
    const btnText = document.getElementById('toggleModulosText');
    const btnIcon = btn.querySelector('i');
    
    modulosColapsados = !modulosColapsados;
    
    // Buscar todos os módulos (existentes e novos)
    const modulos = document.querySelectorAll('.modulo-item');
    
    modulos.forEach(modulo => {
        const content = modulo.querySelector('.modulo-content');
        const icon = modulo.querySelector('.toggle-icon');
        
        if (content && icon) {
            if (modulosColapsados) {
                content.style.display = 'none';
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'block';
                icon.style.transform = 'rotate(180deg)';
            }
        }
    });
    
    // Atualizar botão
    if (modulosColapsados) {
        btnText.textContent = 'Expandir Todos';
        btnIcon.className = 'bi bi-arrows-expand';
    } else {
        btnText.textContent = 'Recolher Todos';
        btnIcon.className = 'bi bi-arrows-collapse';
    }
}

// Função para adicionar tamanho
function adicionarTamanho(moduloId) {
    const container = document.getElementById(`tamanhosContainer_${moduloId}`);
    if (!container) return;
    
    const tamanhoCount = container.children.length + 1;
    
    const tamanhoHTML = `
        <div class="card mb-2" id="tamanho_${moduloId}_${tamanhoCount}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="mb-0">
                        <i class="bi bi-rulers text-success"></i> 
                        Tamanho ${tamanhoCount}
                    </h6>
                    <button type="button" class="btn btn-sm btn-outline-danger" 
                            onclick="removerTamanho('tamanho_${moduloId}_${tamanhoCount}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_largura_total_${moduloId}_${tamanhoCount}" placeholder="Largura Total">
                            <label>Largura Total (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_largura_assento_${moduloId}_${tamanhoCount}" placeholder="Largura Assento">
                            <label>Largura Assento (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_tecido_${moduloId}_${tamanhoCount}" placeholder="Tecido">
                            <label>Tecido (metros)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.001" class="form-control" 
                                   name="tamanho_volume_${moduloId}_${tamanhoCount}" placeholder="Volume">
                            <label>Volume (m³)</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_peso_${moduloId}_${tamanhoCount}" placeholder="Peso">
                            <label>Peso (kg)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_preco_${moduloId}_${tamanhoCount}" placeholder="Preço">
                            <label>Preço (R$)</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-2">
                            <textarea class="form-control" name="tamanho_descricao_${moduloId}_${tamanhoCount}" 
                                      placeholder="Descrição" style="height: 58px;"></textarea>
                            <label>Descrição</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    container.insertAdjacentHTML('beforeend', tamanhoHTML);
}

// Função para remover tamanho
function removerTamanho(tamanhoId) {
    const element = document.getElementById(tamanhoId);
    if (element) element.remove();
}

// Inicializar interface de módulos ao carregar a página
document.addEventListener('DOMContentLoaded', function() {
    // Inicializar estado dos módulos existentes
    const modulosExistentes = document.querySelectorAll('.modulo-item');
    modulosExistentes.forEach(modulo => {
        const content = modulo.querySelector('.modulo-content');
        const icon = modulo.querySelector('.toggle-icon');
        
        if (content && icon) {
            // Começar com módulos expandidos
            content.style.display = 'block';
            icon.style.transform = 'rotate(180deg)';
        }
    });
    
    // Atualizar contador de módulos baseado nos existentes
    moduloCount = modulosExistentes.length;
    
    // Definir estado inicial como expandido
    modulosColapsados = false;
    const btnText = document.getElementById('toggleModulosText');
    const btn = document.getElementById('toggleModulosBtn');
    if (btnText) btnText.textContent = 'Recolher Todos';
    if (btn) {
        const btnIcon = btn.querySelector('i');
        if (btnIcon) btnIcon.className = 'bi bi-arrows-collapse';
    }
});
</script>
