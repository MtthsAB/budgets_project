<!-- JavaScript Unificado para Cadastro de Produtos -->
<script>
let moduloCount = 0;
let produtosDisponiveis = [];
let modulosColapsados = true;

// Carregar produtos para vinculação
document.addEventListener('DOMContentLoaded', function() {
    carregarProdutosDisponiveis();
});

// Função específica para alternar campos por tipo
function toggleCamposEspecificos(tipoNome) {
    // Elementos de controle específicos
    const camposSofa = document.getElementById('campos-sofa');
    const camposAcessorio = document.getElementById('campos-acessorio');
    const camposOutros = document.getElementById('campos-outros');
    const camposBanqueta = document.getElementById('campos-banqueta');
    const dimensoesBanqueta = document.getElementById('dimensoes-banqueta');
    const camposCadeira = document.getElementById('campos-cadeira');
    const dimensoesCadeira = document.getElementById('dimensoes-cadeira');
    const camposPoltrona = document.getElementById('campos-poltrona');
    const dimensoesPoltrona = document.getElementById('dimensoes-poltrona');
    const camposPufe = document.getElementById('campos-pufe');
    const dimensoesPufe = document.getElementById('dimensoes-pufe');
    const camposAlmofada = document.getElementById('campos-almofada');
    const dimensoesAlmofada = document.getElementById('dimensoes-almofada');
    const secaoModulos = document.getElementById('secao-modulos');
    const vinculacaoProdutos = document.getElementById('vinculacao-produtos');
    
    // Esconder todos os campos específicos primeiro
    if (camposSofa) camposSofa.style.display = 'none';
    if (camposAcessorio) camposAcessorio.style.display = 'none';
    if (camposOutros) camposOutros.style.display = 'none';
    if (camposBanqueta) camposBanqueta.style.display = 'none';
    if (dimensoesBanqueta) dimensoesBanqueta.style.display = 'none';
    if (camposCadeira) camposCadeira.style.display = 'none';
    if (dimensoesCadeira) dimensoesCadeira.style.display = 'none';
    if (camposPoltrona) camposPoltrona.style.display = 'none';
    if (dimensoesPoltrona) dimensoesPoltrona.style.display = 'none';
    if (camposPufe) camposPufe.style.display = 'none';
    if (dimensoesPufe) dimensoesPufe.style.display = 'none';
    if (camposAlmofada) camposAlmofada.style.display = 'none';
    if (dimensoesAlmofada) dimensoesAlmofada.style.display = 'none';
    if (secaoModulos) secaoModulos.style.display = 'none';
    if (vinculacaoProdutos) vinculacaoProdutos.style.display = 'none';
    
    // Se nenhum tipo está selecionado, manter tudo escondido
    if (!tipoNome || tipoNome === '') {
        return;
    }
    
    // Mostrar campos conforme o tipo
    if (tipoNome === 'Sofás') {
        if (camposSofa) camposSofa.style.display = 'flex';
        if (secaoModulos) secaoModulos.style.display = 'block';
    } else if (tipoNome === 'Acessórios') {
        if (camposAcessorio) camposAcessorio.style.display = 'flex';
        if (vinculacaoProdutos) vinculacaoProdutos.style.display = 'block';
        if (typeof window.initAcessorioVinculos === 'function') {
            window.initAcessorioVinculos();
        }
    } else if (tipoNome === 'Banquetas') {
        if (camposBanqueta) camposBanqueta.style.display = 'flex';
        if (dimensoesBanqueta) dimensoesBanqueta.style.display = 'block';
    } else if (tipoNome === 'Cadeiras') {
        if (camposCadeira) camposCadeira.style.display = 'flex';
        if (dimensoesCadeira) dimensoesCadeira.style.display = 'block';
    } else if (tipoNome === 'Poltronas') {
        if (camposPoltrona) camposPoltrona.style.display = 'flex';
        if (dimensoesPoltrona) dimensoesPoltrona.style.display = 'block';
    } else if (tipoNome === 'Pufes') {
        if (camposPufe) camposPufe.style.display = 'flex';
        if (dimensoesPufe) dimensoesPufe.style.display = 'block';
    } else if (tipoNome === 'Almofadas') {
        if (camposAlmofada) camposAlmofada.style.display = 'flex';
        if (dimensoesAlmofada) dimensoesAlmofada.style.display = 'block';
    } else {
        // Para outros tipos não implementados
        if (camposOutros) camposOutros.style.display = 'flex';
    }
}

// Função para carregar produtos disponíveis para vinculação
function carregarProdutosDisponiveis() {
    fetch('/api/produtos/')
        .then(response => response.json())
        .then(data => {
            produtosDisponiveis = data;
            renderizarProdutosDisponiveis();
        })
        .catch(error => {
            console.log('Erro ao carregar produtos:', error);
            produtosDisponiveis = [];
            renderizarProdutosDisponiveis();
        });
}

// Função para renderizar checkboxes de produtos
function renderizarProdutosDisponiveis() {
    const container = document.getElementById('produtos-disponiveis');
    if (!container) return;
    
    container.innerHTML = '';
    
    if (produtosDisponiveis.length === 0) {
        container.innerHTML = '<div class="col-12"><p class="text-muted">Nenhum produto disponível para vinculação.</p></div>';
        return;
    }
    
    produtosDisponiveis.forEach(produto => {
        const html = `
            <div class="col-md-4 col-lg-3 mb-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="${produto.id}" 
                           id="produto_${produto.id}" name="produtos_vinculados">
                    <label class="form-check-label" for="produto_${produto.id}">
                        ${produto.ref_produto} - ${produto.nome_produto}
                    </label>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    });
}

// Função para remover módulo
function removerModulo(moduloId) {
    const modulo = document.getElementById(`modulo_${moduloId}`);
    if (modulo) modulo.remove();
    
    // Se não há mais módulos, mostrar alert
    const container = document.getElementById('modulosContainer');
    const noModulosAlert = document.getElementById('noModulosAlert');
    if (container && container.children.length === 0 && noModulosAlert) {
        noModulosAlert.style.display = 'block';
    }
}

// Função para expandir/recolher todos os módulos
function toggleTodosModulos() {
    const btn = document.getElementById('toggleModulosBtn');
    const btnText = document.getElementById('toggleModulosText');
    const btnIcon = btn ? btn.querySelector('i') : null;
    
    if (!btn || !btnText || !btnIcon) {
        console.error('Elementos do botão de módulos não encontrados');
        return;
    }
    
    modulosColapsados = !modulosColapsados;
    
    // Buscar todos os módulos
    const modulos = document.querySelectorAll('[id^="modulo_"]');
    
    modulos.forEach(modulo => {
        const cardBody = modulo.querySelector('.card-body[id^="cardBody_"]');
        const toggleBtn = modulo.querySelector('[id^="toggleBtn_"]');
        const icon = toggleBtn ? toggleBtn.querySelector('i') : null;
        
        if (cardBody && toggleBtn && icon) {
            if (modulosColapsados) {
                // Recolher módulo
                cardBody.style.display = 'none';
                icon.className = 'bi bi-plus-lg';
                toggleBtn.title = 'Expandir módulo';
            } else {
                // Expandir módulo
                cardBody.style.display = 'block';
                icon.className = 'bi bi-dash-lg';
                toggleBtn.title = 'Recolher módulo';
            }
        }
    });
    
    // Atualizar botão
    if (modulosColapsados) {
        btnText.textContent = 'Expandir Todos';
        btnIcon.className = 'bi bi-arrows-expand';
    } else {
        btnText.textContent = 'Recolher Todos';
        btnIcon.className = 'bi bi-arrows-collapse';
    }
}

// Função para expandir/recolher um módulo individual
function toggleModuloIndividual(moduloId) {
    const cardBody = document.getElementById(`cardBody_${moduloId}`);
    const toggleBtn = document.getElementById(`toggleBtn_${moduloId}`);
    const icon = toggleBtn ? toggleBtn.querySelector('i') : null;
    const card = document.getElementById(`modulo_${moduloId}`);
    
    if (cardBody && toggleBtn && icon && card) {
        if (cardBody.style.display === 'none') {
            // Expandir módulo
            cardBody.style.display = 'block';
            icon.className = 'bi bi-dash-lg';
            toggleBtn.title = 'Recolher módulo';
            card.classList.remove('modulo-recolhido');
            card.classList.add('modulo-expandido');
        } else {
            // Recolher módulo
            cardBody.style.display = 'none';
            icon.className = 'bi bi-plus-lg';
            toggleBtn.title = 'Expandir módulo';
            card.classList.remove('modulo-expandido');
            card.classList.add('modulo-recolhido');
        }
    }
}

// Função para mostrar segunda imagem do módulo
function mostrarModuloSegundaImagem(moduloId) {
    const area = document.getElementById(`modulo_segunda_imagem_area_${moduloId}`);
    const btn = document.getElementById(`btn_modulo_segunda_imagem_${moduloId}`);
    if (area) area.style.display = 'block';
    if (btn) btn.style.display = 'none';
}

// Função para remover segunda imagem do módulo
function removeModuloSegundaImagem(moduloId) {
    const preview = document.getElementById(`preview_modulo_secundaria_${moduloId}`);
    const input = document.getElementById(`modulo_imagem_secundaria_${moduloId}`);
    const img = document.getElementById(`img_preview_modulo_secundaria_${moduloId}`);
    const area = document.getElementById(`modulo_segunda_imagem_area_${moduloId}`);
    const btn = document.getElementById(`btn_modulo_segunda_imagem_${moduloId}`);
    
    if (preview) preview.style.display = 'none';
    if (input) input.value = '';
    if (img) img.src = '';
    if (area) area.style.display = 'none';
    if (btn) btn.style.display = 'block';
}

// Função para remover tamanho
function removerTamanho(tamanhoId) {
    const element = document.getElementById(tamanhoId);
    if (element) element.remove();
}

// Função para expandir/recolher todos os tamanhos de um módulo
function toggleTodosTamanhos(moduloId) {
    const btn = document.getElementById(`toggleTamanhosBtn_${moduloId}`);
    const btnText = document.getElementById(`toggleTamanhosText_${moduloId}`);
    const btnIcon = btn ? btn.querySelector('i') : null;
    
    if (!btn || !btnText || !btnIcon) {
        console.error('Elementos do botão de tamanhos não encontrados para módulo:', moduloId);
        return;
    }
    
    // Determinar estado atual baseado no texto do botão
    const isCollapsed = btnText.textContent.includes('Expandir');
    
    // Buscar todos os tamanhos deste módulo
    const tamanhos = document.querySelectorAll(`#tamanhosContainer_${moduloId} .card`);
    
    tamanhos.forEach(tamanho => {
        const cardBody = tamanho.querySelector('.card-body[id^="cardBodyTamanho_"]');
        const toggleBtn = tamanho.querySelector('[id^="toggleBtnTamanho_"]');
        const icon = toggleBtn ? toggleBtn.querySelector('i') : null;
        
        if (cardBody && toggleBtn && icon) {
            if (isCollapsed) {
                // Expandir
                cardBody.style.display = 'block';
                icon.className = 'bi bi-dash-lg';
                toggleBtn.title = 'Recolher tamanho';
            } else {
                // Recolher
                cardBody.style.display = 'none';
                icon.className = 'bi bi-plus-lg';
                toggleBtn.title = 'Expandir tamanho';
            }
        }
    });
    
    // Atualizar botão
    if (isCollapsed) {
        btnText.textContent = 'Recolher Todos';
        btnIcon.className = 'bi bi-arrows-collapse';
    } else {
        btnText.textContent = 'Expandir Todos';
        btnIcon.className = 'bi bi-arrows-expand';
    }
}

// Função para expandir/recolher um tamanho individual
function toggleTamanhoIndividual(moduloId, tamanhoId) {
    const cardBody = document.getElementById(`cardBodyTamanho_${moduloId}_${tamanhoId}`);
    const toggleBtn = document.getElementById(`toggleBtnTamanho_${moduloId}_${tamanhoId}`);
    const icon = toggleBtn ? toggleBtn.querySelector('i') : null;
    const card = document.getElementById(`tamanho_${moduloId}_${tamanhoId}`);
    
    if (cardBody && toggleBtn && icon && card) {
        if (cardBody.style.display === 'none') {
            // Expandir tamanho
            cardBody.style.display = 'block';
            icon.className = 'bi bi-dash-lg';
            toggleBtn.title = 'Recolher tamanho';
            card.classList.remove('tamanho-recolhido');
            card.classList.add('tamanho-expandido');
        } else {
            // Recolher tamanho
            cardBody.style.display = 'none';
            icon.className = 'bi bi-plus-lg';
            toggleBtn.title = 'Expandir tamanho';
            card.classList.remove('tamanho-expandido');
            card.classList.add('tamanho-recolhido');
        }
    }
}

// Validação específica unificada
function validacaoEspecifica(e) {
    const tipoSelect = document.getElementById('tipo_produto');
    const selectedOption = tipoSelect.options[tipoSelect.selectedIndex];
    const tipoNome = selectedOption.getAttribute('data-nome');
    
    if (tipoNome && tipoNome.toLowerCase() === 'acessórios') {
        const precoAcessorio = document.getElementById('preco_acessorio').value;
        if (!precoAcessorio || parseFloat(precoAcessorio) < 0) {
            e.preventDefault();
            alert('Por favor, informe um preço válido para o acessório.');
            return false;
        }
    }
    
    return true;
}
</script>
