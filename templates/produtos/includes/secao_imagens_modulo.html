<!-- Seção de Imagens Reutilizável para Módulos -->
<div class="row mb-3">
    <div class="col-md-8">
        <label for="modulo_imagem_principal_{{ modulo_index }}" class="form-label fw-bold">
            <i class="bi bi-image"></i> Imagem Principal do Módulo
        </label>
        {% if modulo and modulo.imagem_principal %}
        <div class="mb-2">
            <small class="text-muted">Imagem atual:</small><br>
            <img src="{{ modulo.imagem_principal.url }}" alt="Imagem do Módulo" 
                 class="img-thumbnail border border-primary" style="max-width: 200px; max-height: 200px;">
        </div>
        {% endif %}
        <input type="file" class="form-control" id="modulo_imagem_principal_{{ modulo_index }}" name="modulo_imagem_principal_{{ modulo_index }}" 
               accept="image/*" onchange="previewImage(this, 'preview_modulo_principal_{{ modulo_index }}')">
        <div class="form-text">JPG, PNG, GIF (máx. 5MB)</div>
        
        <!-- Preview da Imagem Principal -->
        <div id="preview_modulo_principal_{{ modulo_index }}" class="mt-3" style="display: none;">
            <img id="img_preview_modulo_principal_{{ modulo_index }}" src="" alt="Preview" 
                 class="img-thumbnail border border-primary" style="max-width: 200px; max-height: 200px;">
            <div class="mt-1">
                <button type="button" class="btn btn-sm btn-outline-danger" 
                        onclick="removeImage('preview_modulo_principal_{{ modulo_index }}', 'modulo_imagem_principal_{{ modulo_index }}')">
                    <i class="bi bi-trash"></i> Remover
                </button>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="mb-3">
            {% if modulo and modulo.imagem_secundaria %}
                <div class="mb-2">
                    <label class="form-label fw-bold">
                        <i class="bi bi-image"></i> Segunda Imagem Atual
                    </label>
                    <div>
                        <img src="{{ modulo.imagem_secundaria.url }}" alt="Segunda Imagem do Módulo" 
                             class="img-thumbnail border border-info" style="max-width: 150px; max-height: 150px;">
                        <div class="form-text text-info">Segunda imagem atual</div>
                    </div>
                </div>
            {% endif %}
            <div id="modulo_segunda_imagem_area_{{ modulo_index }}" style="display: none;">
                <label for="modulo_imagem_secundaria_{{ modulo_index }}" class="form-label fw-bold">
                    <i class="bi bi-image"></i> Segunda Imagem
                </label>
                <input type="file" class="form-control" id="modulo_imagem_secundaria_{{ modulo_index }}" name="modulo_imagem_secundaria_{{ modulo_index }}" 
                       accept="image/*" onchange="previewImage(this, 'preview_modulo_secundaria_{{ modulo_index }}')">
                <div class="form-text">Formatos aceitos: JPG, PNG, GIF (máx. 5MB)</div>
                
                <!-- Preview da Segunda Imagem -->
                <div id="preview_modulo_secundaria_{{ modulo_index }}" class="mt-2" style="display: none;">
                    <img id="img_preview_modulo_secundaria_{{ modulo_index }}" src="" alt="Preview Segunda Imagem" 
                         class="img-thumbnail border border-primary" style="max-width: 150px; max-height: 150px;">
                    <div class="mt-1">
                        <button type="button" class="btn btn-sm btn-outline-danger" 
                                onclick="removeModuloSegundaImagem({{ modulo_index }})">
                            <i class="bi bi-trash"></i> Remover
                        </button>
                    </div>
                </div>
            </div>
            <div class="text-end mt-3">
                <button type="button" class="btn btn-outline-primary btn-sm btn-add-image" 
                        id="btn_modulo_segunda_imagem_{{ modulo_index }}" 
                        onclick="mostrarModuloSegundaImagem({{ modulo_index }})" 
                        title="Adicionar segunda imagem">
                    <i class="bi bi-camera-fill"></i><i class="bi bi-plus-circle-fill" style="font-size: 0.7em; margin-left: -3px;"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- CSS específico para seção de imagens do módulo -->
<style>
    .btn-add-image {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #0d6efd;
        background: #fff;
        color: #0d6efd;
        transition: all 0.3s ease;
        position: relative;
    }
    .btn-add-image:hover {
        background: #0d6efd;
        color: #fff;
        transform: scale(1.1);
    }
    .btn-add-image .bi-camera-fill {
        font-size: 14px;
    }
    .btn-add-image .bi-plus-circle-fill {
        position: absolute;
        top: -2px;
        right: -2px;
        background: #fff;
        border-radius: 50%;
        color: #28a745;
    }
</style>

<!-- JavaScript específico para seção de imagens do módulo -->
<script>
function mostrarModuloSegundaImagem(moduloIndex) {
    document.getElementById('modulo_segunda_imagem_area_' + moduloIndex).style.display = 'block';
    document.getElementById('btn_modulo_segunda_imagem_' + moduloIndex).style.display = 'none';
}

function removeModuloSegundaImagem(moduloIndex) {
    document.getElementById('preview_modulo_secundaria_' + moduloIndex).style.display = 'none';
    document.getElementById('img_preview_modulo_secundaria_' + moduloIndex).src = '';
    document.getElementById('modulo_imagem_secundaria_' + moduloIndex).value = '';
    document.getElementById('modulo_segunda_imagem_area_' + moduloIndex).style.display = 'none';
    document.getElementById('btn_modulo_segunda_imagem_' + moduloIndex).style.display = 'block';
}

function previewImage(input, previewId) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('img_' + previewId).src = e.target.result;
            document.getElementById(previewId).style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function removeImage(previewId, inputId) {
    document.getElementById(previewId).style.display = 'none';
    document.getElementById('img_' + previewId).src = '';
    document.getElementById(inputId).value = '';
}
</script>
