<!-- Campos específicos para Sofás -->
<div class="row" id="campos-sofa" style="display: none;">
    <div class="col-md-3">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="ativo" name="ativo" checked>
            <label class="form-check-label" for="ativo">
                Produto Ativo
            </label>
        </div>
    </div>
    <div class="col-md-3">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="tem_cor_tecido" name="tem_cor_tecido">
            <label class="form-check-label" for="tem_cor_tecido">
                Tem Cor Tecido
            </label>
        </div>
    </div>
    <div class="col-md-3">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="tem_difer_desenho_lado" name="tem_difer_desenho_lado">
            <label class="form-check-label" for="tem_difer_desenho_lado">
                Diferencia Lado Dir./Esq.
            </label>
        </div>
    </div>
    <div class="col-md-3">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="tem_difer_desenho_tamanho" name="tem_difer_desenho_tamanho">
            <label class="form-check-label" for="tem_difer_desenho_tamanho">
                Diferencia por Tamanho
            </label>
        </div>
    </div>
</div>
