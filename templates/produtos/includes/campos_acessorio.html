<!-- Campos específicos para Acessórios -->
<div class="row" id="campos-acessorio" style="display: none;">
    <div class="col-md-3">
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="ativo_acessorio" name="ativo" checked>
            <label class="form-check-label" for="ativo_acessorio">
                Acessório Ativo
            </label>
        </div>
    </div>
    <div class="col-md-3">
        <div class="form-floating mb-3">
            <input type="number" step="0.01" class="form-control" id="preco_acessorio" name="preco_acessorio" placeholder="0.00">
            <label for="preco_acessorio">Preço (R$)</label>
        </div>
    </div>
    <div class="col-md-6">
        <div class="form-floating mb-3">
            <textarea class="form-control auto-resize-textarea" id="descricao_acessorio" name="descricao_acessorio" 
                     placeholder="Descrição do acessório" style="height: 58px;"></textarea>
            <label for="descricao_acessorio">Descrição</label>
        </div>
    </div>
</div>
