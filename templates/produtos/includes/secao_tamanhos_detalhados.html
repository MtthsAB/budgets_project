<!-- Seção de Tamanhos Detalhados para Módulos -->
<div id="secao-tamanhos"{% if not tamanhos_detalhados %} style="display: none;"{% endif %}>
    <hr class="my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0">
            <i class="bi bi-rulers text-primary"></i> Tamanhos Detalhados (Opcional)
        </h6>
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleTodosTamanhos()" id="toggleTamanhosBtn">
                <i class="bi bi-arrows-expand"></i> Expandir Todos
            </button>
            <button type="button" class="btn btn-sm btn-success" onclick="adicionarTamanhoDetalhado()">
                <i class="bi bi-plus"></i> Adicionar Tamanho
            </button>
        </div>
    </div>
    <div id="tamanhosContainer">
        {% if tamanhos_detalhados %}
            {% for tamanho in tamanhos_detalhados %}
                <div class="tamanho-item border rounded mb-3" id="tamanho-existente-{{ forloop.counter }}">
                    <div class="tamanho-header d-flex justify-content-between align-items-center p-3 bg-light rounded-top" 
                         style="cursor: pointer;" onclick="toggleTamanho({{ forloop.counter }}, 'existente')">
                        <h6 class="mb-0">
                            <i class="bi bi-rulers text-primary"></i> Tamanho {{ forloop.counter }}
                            <i class="bi bi-chevron-down ms-2 toggle-icon" id="toggle-tamanho-existente-{{ forloop.counter }}"></i>
                        </h6>
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); removerTamanhoExistente({{ forloop.counter }})">
                            <i class="bi bi-trash"></i> Remover
                        </button>
                    </div>
                    
                    <div class="tamanho-content p-3" id="content-tamanho-existente-{{ forloop.counter }}">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <select class="form-select" name="tamanho_modulo_{{ forloop.counter }}" required>
                                        <option value="">Selecione o módulo</option>
                                        {% for modulo in modulos %}
                                            <option value="{{ modulo.id }}" 
                                                    {% if tamanho.id_modulo.id == modulo.id %}selected{% endif %}>
                                                {{ modulo.nome }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                    <label>Módulo *</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="number" step="0.01" class="form-control" name="tamanho_largura_total_{{ forloop.counter }}" 
                                           value="{{ tamanho.largura_total|default:'' }}" placeholder="Largura Total">
                                    <label>Largura Total (cm)</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" step="0.01" class="form-control" name="tamanho_largura_assento_{{ forloop.counter }}" 
                                           value="{{ tamanho.largura_assento|default:'' }}" placeholder="Largura do Assento">
                                    <label>Largura do Assento (cm)</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" step="0.01" class="form-control" name="tamanho_tecido_metros_{{ forloop.counter }}" 
                                           value="{{ tamanho.tecido_metros|default:'' }}" placeholder="Tecido">
                                    <label>Tecido (metros)</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" step="0.001" class="form-control" name="tamanho_volume_m3_{{ forloop.counter }}" 
                                           value="{{ tamanho.volume_m3|default:'' }}" placeholder="Volume">
                                    <label>Volume (m³)</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" step="0.01" class="form-control" name="tamanho_peso_kg_{{ forloop.counter }}" 
                                           value="{{ tamanho.peso_kg|default:'' }}" placeholder="Peso">
                                    <label>Peso (kg)</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" step="0.01" class="form-control" name="tamanho_preco_{{ forloop.counter }}" 
                                           value="{{ tamanho.preco|default:'' }}" placeholder="Preço">
                                    <label>Preço (R$)</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Descrição</label>
                                    <textarea class="form-control" name="tamanho_descricao_{{ forloop.counter }}" 
                                              rows="2" placeholder="Descrição do tamanho">{{ tamanho.descricao|default:'' }}</textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        {% endif %}
    </div>
    <div class="alert alert-info mb-0" id="noTamanhosAlert"{% if tamanhos_detalhados %} style="display: none;"{% endif %}>
        <i class="bi bi-info-circle"></i> 
        Os tamanhos detalhados são opcionais. Clique em "Adicionar Tamanho" se desejar adicionar informações específicas de tamanhos.
    </div>
</div>
