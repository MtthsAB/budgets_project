<!-- JavaScript específico para Sofás -->
<script>
let moduloCount = 0;

// Função específica para alternar campos de sofás
function toggleCamposEspecificos(tipoNome) {
    const camposSofa = document.getElementById('campos-sofa');
    const secaoModulos = document.getElementById('secao-modulos');
    
    // Esconder campos específicos primeiro
    if (camposSofa) camposSofa.style.display = 'none';
    if (secaoModulos) secaoModulos.style.display = 'none';
    
    // Mostrar campos conforme o tipo
    if (tipoNome === 'Sofás') {
        if (camposSofa) camposSofa.style.display = 'flex';
        if (secaoModulos) secaoModulos.style.display = 'block';
    }
}

// Função para adicionar módulo
function adicionarModulo() {
    moduloCount++;
    const container = document.getElementById('modulosContainer');
    const noModulosAlert = document.getElementById('noModulosAlert');
    
    if (noModulosAlert) noModulosAlert.style.display = 'none';
    
    const moduloHTML = `
        <div class="card mb-3" id="modulo_${moduloCount}">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">Módulo ${moduloCount}</h6>
                <button type="button" class="btn btn-sm btn-danger" onclick="removerModulo(${moduloCount})">
                    <i class="bi bi-trash"></i> Remover
                </button>
            </div>
            <div class="card-body">
                <!-- Nome do Módulo -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="modulo_nome_${moduloCount}" name="modulo_nome" placeholder="Nome">
                            <label for="modulo_nome_${moduloCount}">Nome do Módulo</label>
                        </div>
                    </div>
                </div>
                
                <!-- Campos de dimensões -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <div class="form-floating">
                            <input type="number" step="0.01" class="form-control" id="modulo_profundidade_${moduloCount}" name="modulo_profundidade_${moduloCount}" placeholder="Profundidade">
                            <label for="modulo_profundidade_${moduloCount}">Profundidade (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating">
                            <input type="number" step="0.01" class="form-control" id="modulo_altura_${moduloCount}" name="modulo_altura_${moduloCount}" placeholder="Altura">
                            <label for="modulo_altura_${moduloCount}">Altura (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating">
                            <input type="number" step="0.01" class="form-control" id="modulo_braco_${moduloCount}" name="modulo_braco_${moduloCount}" placeholder="Braço">
                            <label for="modulo_braco_${moduloCount}">Braço (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating">
                            <textarea class="form-control" id="modulo_descricao_${moduloCount}" name="modulo_descricao_${moduloCount}" placeholder="Descrição" style="height: 58px;"></textarea>
                            <label for="modulo_descricao_${moduloCount}">Descrição (Opcional)</label>
                        </div>
                    </div>
                </div>
                
                <!-- Imagens do Módulo -->
                <div class="row mb-3">
                    <div class="col-md-8">
                        <label for="modulo_imagem_principal_${moduloCount}" class="form-label fw-bold">
                            <i class="bi bi-image"></i> Imagem Principal do Módulo
                        </label>
                        <input type="file" class="form-control" id="modulo_imagem_principal_${moduloCount}" name="modulo_imagem_principal_${moduloCount}" 
                               accept="image/*" onchange="previewImage(this, 'preview_modulo_principal_${moduloCount}')">
                        <div id="preview_modulo_principal_${moduloCount}" class="mt-3" style="display: none;">
                            <img id="img_preview_modulo_principal_${moduloCount}" src="" alt="Preview" 
                                 class="img-thumbnail border border-primary" style="max-width: 250px; max-height: 250px;">
                            <button type="button" class="btn btn-sm btn-danger mt-2" onclick="removeImage('preview_modulo_principal_${moduloCount}', 'modulo_imagem_principal_${moduloCount}')">
                                <i class="bi bi-trash"></i> Remover
                            </button>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <div id="modulo_segunda_imagem_area_${moduloCount}" style="display: none;">
                            <label for="modulo_imagem_secundaria_${moduloCount}" class="form-label fw-bold">
                                <i class="bi bi-image"></i> Segunda Imagem
                            </label>
                            <input type="file" class="form-control" id="modulo_imagem_secundaria_${moduloCount}" name="modulo_imagem_secundaria_${moduloCount}" 
                                   accept="image/*" onchange="previewImage(this, 'preview_modulo_secundaria_${moduloCount}')">
                            <div id="preview_modulo_secundaria_${moduloCount}" class="mt-3" style="display: none;">
                                <img id="img_preview_modulo_secundaria_${moduloCount}" src="" alt="Preview" 
                                     class="img-thumbnail border border-primary" style="max-width: 150px; max-height: 150px;">
                                <button type="button" class="btn btn-sm btn-danger mt-2" onclick="removeModuloSegundaImagem(${moduloCount})">
                                    <i class="bi bi-trash"></i> Remover
                                </button>
                            </div>
                        </div>
                        <div class="text-end mt-3">
                            <button type="button" class="btn btn-outline-primary btn-sm btn-add-image" 
                                    id="btn_modulo_segunda_imagem_${moduloCount}" 
                                    onclick="mostrarModuloSegundaImagem(${moduloCount})"
                                    title="Adicionar outra imagem">
                                <i class="bi bi-camera-fill"></i><i class="bi bi-plus-circle-fill" style="font-size: 0.7em; margin-left: -3px;"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Tamanhos do Módulo (Opcional) -->
                <div class="mt-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="mb-0">
                            <i class="bi bi-rulers"></i> Tamanhos (Opcional)
                        </h6>
                        <button type="button" class="btn btn-sm btn-outline-success" onclick="adicionarTamanho(${moduloCount})">
                            <i class="bi bi-plus"></i> Adicionar Tamanho
                        </button>
                    </div>
                    <div id="tamanhosContainer_${moduloCount}">
                        <!-- Tamanhos serão adicionados aqui -->
                    </div>
                </div>
            </div>
        </div>
    `;
    
    if (container) container.insertAdjacentHTML('beforeend', moduloHTML);
}

// Função para remover módulo
function removerModulo(moduloId) {
    const modulo = document.getElementById(`modulo_${moduloId}`);
    if (modulo) modulo.remove();
    
    // Se não há mais módulos, mostrar alert
    const container = document.getElementById('modulosContainer');
    const noModulosAlert = document.getElementById('noModulosAlert');
    if (container && container.children.length === 0 && noModulosAlert) {
        noModulosAlert.style.display = 'block';
    }
}

// Função para mostrar segunda imagem do módulo
function mostrarModuloSegundaImagem(moduloId) {
    const area = document.getElementById(`modulo_segunda_imagem_area_${moduloId}`);
    const btn = document.getElementById(`btn_modulo_segunda_imagem_${moduloId}`);
    if (area) area.style.display = 'block';
    if (btn) btn.style.display = 'none';
}

// Função para remover segunda imagem do módulo
function removeModuloSegundaImagem(moduloId) {
    const preview = document.getElementById(`preview_modulo_secundaria_${moduloId}`);
    const input = document.getElementById(`modulo_imagem_secundaria_${moduloId}`);
    const img = document.getElementById(`img_preview_modulo_secundaria_${moduloId}`);
    const area = document.getElementById(`modulo_segunda_imagem_area_${moduloId}`);
    const btn = document.getElementById(`btn_modulo_segunda_imagem_${moduloId}`);
    
    if (preview) preview.style.display = 'none';
    if (input) input.value = '';
    if (img) img.src = '';
    if (area) area.style.display = 'none';
    if (btn) btn.style.display = 'block';
}

// Função para adicionar tamanho
function adicionarTamanho(moduloId) {
    const container = document.getElementById(`tamanhosContainer_${moduloId}`);
    if (!container) return;
    
    const tamanhoCount = container.children.length + 1;
    
    const tamanhoHTML = `
        <div class="card mb-2" id="tamanho_${moduloId}_${tamanhoCount}">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" name="tamanho_largura_total_${moduloId}" placeholder="Largura Total">
                            <label>Largura Total (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" name="tamanho_largura_assento_${moduloId}" placeholder="Largura Assento">
                            <label>Largura Assento (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" name="tamanho_tecido_${moduloId}" placeholder="Tecido">
                            <label>Tecido (metros)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.001" class="form-control" name="tamanho_volume_${moduloId}" placeholder="Volume">
                            <label>Volume (m³)</label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" name="tamanho_peso_${moduloId}" placeholder="Peso">
                            <label>Peso (kg)</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" name="tamanho_preco_${moduloId}" placeholder="Preço">
                            <label>Preço (R$)</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-2">
                            <textarea class="form-control" name="tamanho_descricao_${moduloId}" placeholder="Descrição" style="height: 58px;"></textarea>
                            <label>Descrição</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="d-flex align-items-end">
                            <button type="button" class="btn btn-sm btn-danger" onclick="removerTamanho('tamanho_${moduloId}_${tamanhoCount}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    container.insertAdjacentHTML('beforeend', tamanhoHTML);
}

// Função para remover tamanho
function removerTamanho(tamanhoId) {
    const element = document.getElementById(tamanhoId);
    if (element) element.remove();
}
</script>
