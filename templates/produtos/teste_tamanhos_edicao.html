{% extends 'base.html' %}

{% block title %}Teste Edição - Tamanhos{% endblock %}

{% block content %}
<div class="container">
    <h1>Teste de Adição de Tamanhos na Edição</h1>
    
    <form method="post" id="testeForm">
        {% csrf_token %}
        
        <div class="card mb-4">
            <div class="card-header">
                <h5>Módulo de Teste</h5>
                <button type="button" class="btn btn-sm btn-success" onclick="adicionarTamanho(1)">
                    Adicionar Tamanho
                </button>
            </div>
            <div class="card-body">
                <div id="tamanhosContainer_1">
                    <!-- Tamanhos serão adicionados aqui -->
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
</div>

<script>
// Função para adicionar tamanho
function adicionarTamanho(moduloId) {
    const container = document.getElementById(`tamanhosContainer_${moduloId}`);
    const tamanhoCount = container.children.length + 1;
    
    console.log(`Adicionando tamanho ${tamanhoCount} para módulo ${moduloId}`);
    
    const tamanhoHTML = `
        <div class="card mb-2" id="tamanho_${moduloId}_${tamanhoCount}">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_largura_total_${moduloId}_${tamanhoCount}" 
                                   placeholder="Largura Total">
                            <label>Largura Total (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_largura_assento_${moduloId}_${tamanhoCount}" 
                                   placeholder="Largura Assento">
                            <label>Largura Assento (cm)</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_tecido_${moduloId}_${tamanhoCount}" 
                                   placeholder="Tecido">
                            <label>Tecido (metros)</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.001" class="form-control" 
                                   name="tamanho_volume_${moduloId}_${tamanhoCount}" 
                                   placeholder="Volume">
                            <label>Volume (m³)</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="d-flex align-items-end">
                            <button type="button" class="btn btn-sm btn-danger" 
                                    onclick="removerTamanho('tamanho_${moduloId}_${tamanhoCount}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_peso_${moduloId}_${tamanhoCount}" 
                                   placeholder="Peso">
                            <label>Peso (kg)</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-2">
                            <input type="number" step="0.01" class="form-control" 
                                   name="tamanho_preco_${moduloId}_${tamanhoCount}" 
                                   placeholder="Preço">
                            <label>Preço (R$)</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating mb-2">
                            <textarea class="form-control" 
                                      name="tamanho_descricao_${moduloId}_${tamanhoCount}" 
                                      placeholder="Descrição" style="height: 60px;"></textarea>
                            <label>Descrição</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    container.insertAdjacentHTML('beforeend', tamanhoHTML);
    console.log(`Tamanho ${tamanhoCount} adicionado com sucesso!`);
}

// Função para remover tamanho
function removerTamanho(tamanhoId) {
    console.log(`Removendo tamanho: ${tamanhoId}`);
    document.getElementById(tamanhoId).remove();
}

// Debug do formulário
document.getElementById('testeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    console.log('=== DADOS DO FORMULÁRIO ===');
    
    for (let [key, value] of formData.entries()) {
        if (key.startsWith('tamanho_')) {
            console.log(`${key}: ${value}`);
        }
    }
    
    console.log('=== FIM DOS DADOS ===');
    alert('Dados do formulário enviados para o console!');
});
</script>
{% endblock %}
