<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Simplificado - Teste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-3">
        <h1 class="text-center mb-4">Teste: Cadastro de Produto com Imagens</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Dados Básicos -->
            <div class="card mb-4">
                <div class="card-header bg-info text-white">
                    <h5><i class="bi bi-info-circle"></i> Dados Básicos</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <label for="ref_produto" class="form-label">Referência *</label>
                            <input type="text" class="form-control" id="ref_produto" name="ref_produto" required>
                        </div>
                        <div class="col-md-6">
                            <label for="nome_produto" class="form-label">Nome do Produto *</label>
                            <input type="text" class="form-control" id="nome_produto" name="nome_produto" required>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- SEÇÃO DE IMAGENS - TESTE -->
            <div class="card mb-4 border-primary">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-images"></i> UPLOAD DE IMAGENS
                    </h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning">
                        <strong>TESTE:</strong> Se você consegue ver esta seção, os campos de imagem deveriam estar visíveis abaixo.
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="border p-3 bg-light">
                                <label for="imagem_principal" class="form-label fw-bold text-primary">
                                    <i class="bi bi-image"></i> IMAGEM PRINCIPAL
                                </label>
                                <input type="file" 
                                       class="form-control form-control-lg border-primary" 
                                       id="imagem_principal" 
                                       name="imagem_principal" 
                                       accept="image/*">
                                <div class="form-text">Formatos: JPG, PNG, GIF (máx. 5MB)</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="border p-3 bg-light">
                                <label for="imagem_secundaria" class="form-label fw-bold text-primary">
                                    <i class="bi bi-image"></i> IMAGEM SECUNDÁRIA
                                </label>
                                <input type="file" 
                                       class="form-control form-control-lg border-primary" 
                                       id="imagem_secundaria" 
                                       name="imagem_secundaria" 
                                       accept="image/*">
                                <div class="form-text">Formatos: JPG, PNG, GIF (máx. 5MB)</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-save"></i> SALVAR PRODUTO
                </button>
            </div>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
