<!-- Busca de Cliente -->
<div class="col-md-8 cliente-expandido">
    <div class="mb-3">
        <label for="cliente-busca" class="form-label">
            <i class="bi bi-person-check"></i> Cliente *
        </label>
        <div class="busca-cliente">
            <input type="text" 
                   class="form-control cliente-busca" 
                   id="cliente-busca" 
                   data-testid="cliente-input"
                   placeholder="Digite o nome da empresa ou representante..." 
                   autocomplete="off"
                   value="{{ cliente_inicial|default:'' }}">
            
            <div class="resultados-busca cliente-resultados" 
                 data-testid="cliente-results" 
                 style="display: none;">
                <!-- Resultados da busca aparecerão aqui -->
            </div>
        </div>
        
        <!-- Campo oculto para armazenar o ID do cliente selecionado -->
        <input type="hidden" 
               name="{{ form.cliente.name }}" 
               id="id_cliente" 
               data-testid="cliente-id"
               value="{{ form.cliente.value|default:'' }}">
        
        {% if form.cliente.errors %}
            <div class="invalid-feedback d-block">
                {{ form.cliente.errors }}
            </div>
        {% endif %}
    </div>
</div>
