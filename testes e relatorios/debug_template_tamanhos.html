<!DOCTYPE html>
<html>
<head>
    <title>Debug - Seção Tamanhos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>Debug - Seção de Tamanhos</h3>
        
        <!-- Simulando a estrutura da seção de tamanhos -->
        <div class="mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0">
                    <i class="bi bi-rulers text-success"></i> Tamanhos (Opcional)
                </h6>
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="toggleTodosTamanhos(1)" id="toggleTamanhosBtn_1">
                        <i class="bi bi-arrows-expand"></i> <span id="toggleTamanhosText_1">Expandir Todos</span>
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-success" onclick="adicionarTamanho(1)">
                        <i class="bi bi-plus"></i> Adicionar Tamanho
                    </button>
                </div>
            </div>
            <div id="tamanhosContainer_1">
                <!-- Container dos tamanhos -->
            </div>
        </div>
    </div>

    <script>
        function toggleTodosTamanhos(moduloId) {
            alert('Função toggleTodosTamanhos chamada para módulo: ' + moduloId);
        }
        
        function adicionarTamanho(moduloId) {
            alert('Função adicionarTamanho chamada para módulo: ' + moduloId);
        }
    </script>
</body>
</html>
